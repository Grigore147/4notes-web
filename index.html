<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4notes-web</title>
    <style>
      /** TODO: move to a more common styles file */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        box-sizing: content-box !important;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: rgb(31, 31, 31);
        font-family: system-ui, sans-serif;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #444;
        border-top-color: rgb(228, 109, 36);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader">
      <div class="spinner"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
